# Benchmark 回归工作流 — 自动化性能基准回归检测
#
# 触发条件：
#   - Push 到 main 分支（记录基线）
#   - PR 到 main 分支（对比基线，检测性能回归）
#
# 功能：
#   1. 运行 Go benchmark 套件
#   2. 与历史基线对比（使用 benchstat 风格分析）
#   3. 运行验收测试（QPS >= 5000, 内存 < 500MB, 开销 < 3.3x）
#   4. 将结果存储为 artifact 供后续对比
#   5. 在 PR 中评论性能变化摘要
#
# 对应任务：P4-001e（CI 集成自动化 benchmark 回归）

name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - "pkg/**"
      - "benchmarks/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [main]
    paths:
      - "pkg/**"
      - "benchmarks/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read
  pull-requests: write

env:
  GO_VERSION: "1.25"
  BENCHMARK_COUNT: "3"

jobs:
  # ============================================================================
  # Benchmark 运行 + 回归检测
  # ============================================================================
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      # ========================================================================
      # 运行 Benchmark 套件
      # ========================================================================
      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -count=${{ env.BENCHMARK_COUNT }} \
            -timeout=600s \
            -benchtime=1x \
            ./benchmarks/ \
            | tee benchmark-results.txt

      - name: Run benchmark acceptance tests
        run: |
          go test -run "TestQPSAcceptance|TestMemoryAcceptance|TestComparisonOverheadAcceptance" \
            -timeout=300s \
            -v \
            ./benchmarks/ \
            2>&1 | tee acceptance-results.txt

      # ========================================================================
      # 基线对比（仅 PR 时执行）
      # ========================================================================
      - name: Download baseline benchmark
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: benchmark-baseline
          path: baseline/
        continue-on-error: true

      - name: Compare with baseline
        if: github.event_name == 'pull_request'
        id: compare
        run: |
          if [ -f baseline/benchmark-results.txt ]; then
            echo "Found baseline, running benchstat comparison..."
            benchstat baseline/benchmark-results.txt benchmark-results.txt > comparison.txt 2>&1 || true
            
            echo "=== Benchmark Comparison ==="
            cat comparison.txt
            
            # 检查是否有显著性能回归（> 20% 退化）
            REGRESSION="false"
            if grep -q "+[2-9][0-9]\." comparison.txt 2>/dev/null || \
               grep -q "+[1-9][0-9][0-9]" comparison.txt 2>/dev/null; then
              REGRESSION="true"
            fi
            echo "regression=$REGRESSION" >> "$GITHUB_OUTPUT"
            
            # 生成 PR 评论内容
            {
              echo "comment<<EOF"
              echo "## 📊 Benchmark Comparison"
              echo ""
              echo "<details>"
              echo "<summary>Click to expand benchmark results</summary>"
              echo ""
              echo '```'
              cat comparison.txt
              echo '```'
              echo ""
              echo "</details>"
              echo ""
              if [ "$REGRESSION" = "true" ]; then
                echo "⚠️ **Potential performance regression detected.** Please review the benchmark results."
              else
                echo "✅ No significant performance regression detected."
              fi
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No baseline found, skipping comparison."
            echo "regression=false" >> "$GITHUB_OUTPUT"
            {
              echo "comment<<EOF"
              echo "## 📊 Benchmark Results"
              echo ""
              echo "No baseline available for comparison. This run will establish the baseline."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.compare.outputs.comment != ''
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `${{ steps.compare.outputs.comment }}`;
            
            // 查找已有的 benchmark 评论
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.body.includes('📊 Benchmark') && c.user.type === 'Bot'
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      # ========================================================================
      # 存储基线（仅 main 分支 push 时）
      # ========================================================================
      - name: Upload benchmark baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: benchmark-results.txt
          retention-days: 90

      # ========================================================================
      # 上传本次结果
      # ========================================================================
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            benchmark-results.txt
            acceptance-results.txt
          retention-days: 30

      # ========================================================================
      # 回归检测失败时标记（不阻塞 CI，仅警告）
      # ========================================================================
      - name: Check for regression
        if: steps.compare.outputs.regression == 'true'
        run: |
          echo "::warning::Potential performance regression detected. Please review benchmark comparison."
